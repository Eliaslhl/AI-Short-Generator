    <script>
      (function() {
        function insertScript(src) {
          var s = document.createElement('script');
          s.src = src;
          s.async = true;
          document.head.appendChild(s);
          return s;

        function initAnalytics() {
          // Load GTM and gtag non-blocking
          insertScript('https://www.googletagmanager.com/gtm.js?id=GTM-5VQ2XKGN');
          insertScript('https://www.googletagmanager.com/gtag/js?id=G-ZCVTW1YJMD');

          window.dataLayer = window.dataLayer || [];
          function gtag(){ window.dataLayer.push(arguments); }
          window.gtag = window.gtag || gtag;
          window.gtag('js', new Date());
          window.gtag('config', 'G-ZCVTW1YJMD');
        }

        function scheduleInit() {
          if (window.__ai_shorts_gtm_loaded) return;
          window.__ai_shorts_gtm_loaded = true;
          if ('requestIdleCallback' in window) {
            requestIdleCallback(initAnalytics, {timeout: 2000});
          } else {
            setTimeout(initAnalytics, 2000);
          }
        }

        // Load after page load idle or on first user interaction
        if (document.readyState === 'complete') {
          scheduleInit();
        } else {
          window.addEventListener('load', scheduleInit, {once: true});
        }

        ['click','keydown','touchstart','scroll'].forEach(function(evt) {
          window.addEventListener(evt, function onFirst() {
            scheduleInit();
            window.removeEventListener(evt, onFirst);
          }, {passive: true, once: true});
        });
      })();
    </script>
