# Exemple Kubernetes: créer un Secret et monter dans un Deployment
# 1) Créer le secret localement:
#    kubectl create secret generic youtube-cookies --from-file=cookies.txt=./cookies.txt

apiVersion: v1
kind: Secret
metadata:
  name: youtube-cookies
type: Opaque
# (optionnel) data: si vous voulez définir le secret en clair dans ce manifest,
# encodez cookies.txt en base64 et placez le contenu ici sous la clé 'cookies.txt'

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-shorts-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-shorts
  template:
    metadata:
      labels:
        app: ai-shorts
    spec:
      containers:
      - name: app
        image: your-image:latest
        env:
        - name: YOUTUBE_COOKIES_FILE
          value: /var/secrets/youtube/cookies.txt
        volumeMounts:
        - name: youtube-cookies
          mountPath: /var/secrets/youtube
          readOnly: true
      volumes:
      - name: youtube-cookies
        secret:
          secretName: youtube-cookies
