<!doctype html>

  <head>
    <!-- Google tag (gtag.js) & Google Tag Manager
         Loaded lazily after initial render (requestIdleCallback or on first interaction)
         to avoid blocking LCP and Speed Index on mobile. -->
    <script>
      (function() {
        function insertScript(src) {
          var s = document.createElement('script');
          s.src = src;
          s.async = true;
          document.head.appendChild(s);
          return s;
        }

        function initAnalytics() {
          // Load GTM and gtag non-blocking
          insertScript('https://www.googletagmanager.com/gtm.js?id=GTM-5VQ2XKGN');
          insertScript('https://www.googletagmanager.com/gtag/js?id=G-ZCVTW1YJMD');

          // Minimal gtag shim so calls before the lib loads are buffered
          window.dataLayer = window.dataLayer || [];
          function gtag(){ window.dataLayer.push(arguments); }
          window.gtag = window.gtag || gtag;
          window.gtag('js', new Date());
          window.gtag('config', 'G-ZCVTW1YJMD');
        }

        function scheduleInit() {
          if (window.__ai_shorts_gtm_loaded) return;
          window.__ai_shorts_gtm_loaded = true;
          if ('requestIdleCallback' in window) {
            requestIdleCallback(initAnalytics, {timeout: 2000});
          } else {
            setTimeout(initAnalytics, 2000);
          }
        }

        // Load after page load idle or on first user interaction — only if cookie consent given
        function handleConsentChange() {
          try {
            var consent = localStorage.getItem('cookie_consent') === 'true'
            if (consent) scheduleInit()
          } catch (e) {}
        }

        // If consent already given, schedule immediately
        handleConsentChange()

        // Listen for a custom event dispatched by the cookie banner when the user accepts
        window.addEventListener('cookie-consent', handleConsentChange, {once: true})

        // Also trigger on first interaction only when consent exists
        ['click','keydown','touchstart','scroll'].forEach(function(evt) {
          try {
            // define the handler in the outer scope so removeEventListener can
            // reference the exact same function object when called.
            var handler = function() {
              try {
                if (localStorage.getItem('cookie_consent') === 'true') {
                  scheduleInit();
                  try { window.removeEventListener(evt, handler); } catch (e) {}
                }
              } catch (e) {}
            };

            // Some older browsers may throw when passing an options object.
            try {
              window.addEventListener(evt, handler, {passive: true});
            } catch (e) {
              window.addEventListener(evt, handler);
            }
          } catch (e) {}
        });
      })();
    </script>
